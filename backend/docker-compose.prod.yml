services:
  api:
    image: ${DOCKER_IMAGE:?Set DOCKER_IMAGE in .env e.g. usuario/vitrine-pdv-api:latest}
    pull_policy: always
    container_name: vitrine_pdv_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_ENV: production
    expose:
      - "8000"
    ports: !reset []

  nginx:
    image: nginx:1.27-alpine
    container_name: vitrine_pdv_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
